<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#16203C"/>
      <stop offset="100%" stop-color="#07080E"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Star field -->
  <circle cx="80" cy="60" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="250" cy="30" r="1" fill="white" opacity="0.25"/>
  <circle cx="500" cy="45" r="0.6" fill="white" opacity="0.18"/>
  <circle cx="780" cy="25" r="1" fill="white" opacity="0.22"/>
  <circle cx="980" cy="55" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="40" cy="800" r="0.6" fill="white" opacity="0.15"/>
  <circle cx="1050" cy="700" r="0.8" fill="white" opacity="0.15"/>
  <circle cx="140" cy="1000" r="0.5" fill="white" opacity="0.12"/>
  <circle cx="950" cy="1020" r="0.7" fill="white" opacity="0.12"/>

  <!-- Top gold bar -->
  <rect x="0" y="0" width="1080" height="3" fill="#C89B3C" opacity="0.7"/>

  <!-- HEADER -->
  <text x="540" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" font-weight="bold" letter-spacing="3.5" fill="#C89B3C" opacity="0.65">STOPPING THE COLLAPSE · RICK BROIDER</text>
  <text x="540" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">The 7 Structural Patterns</text>
  <text x="540" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="900" fill="#C89B3C" font-style="italic">That Collapse Regenerative Projects</text>
  <text x="540" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#9898B8">Named. Mapped. Stoppable. Free diagnostic at stopthecollapse.com</text>
  <line x1="120" y1="192" x2="960" y2="192" stroke="#C89B3C" stroke-width="0.5" opacity="0.35"/>

  <!-- PATTERN CARDS — 4 top, 3 bottom, square layout -->
  <!-- Top row: 4 cards, each ~248px wide, x: 20, 280, 540, 800 -->

  <!-- F1 -->
  <rect x="20" y="206" width="248" height="200" rx="8" fill="#C0392B" fill-opacity="0.07" stroke="#C0392B" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="20" y="206" width="5" height="200" rx="2" fill="#C0392B" opacity="0.75"/>
  <text x="38" y="234" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#C0392B" letter-spacing="1">F1</text>
  <text x="38" y="256" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">Interpersonal Conflict</text>
  <line x1="38" y1="265" x2="256" y2="265" stroke="#C0392B" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="38" y="282" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">The same argument keeps</text>
  <text x="38" y="296" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">coming back in different forms.</text>
  <text x="38" y="316" font-family="Georgia, serif" font-size="10" fill="#9898B8">Conflict is not the problem.</text>
  <text x="38" y="330" font-family="Georgia, serif" font-size="10" fill="#9898B8">The missing container is.</text>
  <text x="38" y="344" font-family="Georgia, serif" font-size="10" fill="#9898B8">Build it before it's needed.</text>
  <rect x="38" y="360" width="134" height="15" rx="3" fill="#C0392B" fill-opacity="0.12" stroke="#C0392B" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="46" y="370.5" font-family="Georgia, serif" font-size="8.5" fill="#C0392B" opacity="0.9">Ch: 18 · 22 · 25 · 28 · 31</text>

  <!-- F2 -->
  <rect x="280" y="206" width="248" height="200" rx="8" fill="#D9A741" fill-opacity="0.07" stroke="#D9A741" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="280" y="206" width="5" height="200" rx="2" fill="#D9A741" opacity="0.75"/>
  <text x="298" y="234" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#D9A741" letter-spacing="1">F2</text>
  <text x="298" y="256" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">No Shared Vision</text>
  <line x1="298" y1="265" x2="516" y2="265" stroke="#D9A741" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="298" y="282" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">People are working but pulling</text>
  <text x="298" y="296" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">in different directions.</text>
  <text x="298" y="316" font-family="Georgia, serif" font-size="10" fill="#9898B8">Vision drift is structural,</text>
  <text x="298" y="330" font-family="Georgia, serif" font-size="10" fill="#9898B8">not a communication failure.</text>
  <text x="298" y="344" font-family="Georgia, serif" font-size="10" fill="#9898B8">Encode it or lose it.</text>
  <rect x="298" y="360" width="154" height="15" rx="3" fill="#D9A741" fill-opacity="0.12" stroke="#D9A741" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="306" y="370.5" font-family="Georgia, serif" font-size="8.5" fill="#D9A741" opacity="0.9">Ch: 1 · 6 · 11 · 19 · 23 · 27 · 33</text>

  <!-- F3 -->
  <rect x="540" y="206" width="248" height="200" rx="8" fill="#7B68EE" fill-opacity="0.07" stroke="#7B68EE" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="540" y="206" width="5" height="200" rx="2" fill="#7B68EE" opacity="0.75"/>
  <text x="558" y="234" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#7B68EE" letter-spacing="1">F3</text>
  <text x="558" y="256" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">Governance Shadows</text>
  <line x1="558" y1="265" x2="776" y2="265" stroke="#7B68EE" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="558" y="282" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">Decisions happen but no one</text>
  <text x="558" y="296" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">knows by whom or how.</text>
  <text x="558" y="316" font-family="Georgia, serif" font-size="10" fill="#9898B8">Fake flatness is hierarchy</text>
  <text x="558" y="330" font-family="Georgia, serif" font-size="10" fill="#9898B8">without accountability.</text>
  <text x="558" y="344" font-family="Georgia, serif" font-size="10" fill="#9898B8">Power always finds a home.</text>
  <rect x="558" y="360" width="156" height="15" rx="3" fill="#7B68EE" fill-opacity="0.12" stroke="#7B68EE" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="566" y="370.5" font-family="Georgia, serif" font-size="8.5" fill="#7B68EE" opacity="0.9">Ch: 4 · 8 · 12 · 15 · 21 · 22 · 25</text>

  <!-- F4 -->
  <rect x="800" y="206" width="260" height="200" rx="8" fill="#B87333" fill-opacity="0.07" stroke="#B87333" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="800" y="206" width="5" height="200" rx="2" fill="#B87333" opacity="0.75"/>
  <text x="818" y="234" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#B87333" letter-spacing="1">F4</text>
  <text x="818" y="256" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">Financial Fragility</text>
  <line x1="818" y1="265" x2="1048" y2="265" stroke="#B87333" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="818" y="282" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">Survival depends on one or</text>
  <text x="818" y="296" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">two people's endurance.</text>
  <text x="818" y="316" font-family="Georgia, serif" font-size="10" fill="#9898B8">Financial anxiety creates</text>
  <text x="818" y="330" font-family="Georgia, serif" font-size="10" fill="#9898B8">scarcity. Scarcity destroys</text>
  <text x="818" y="344" font-family="Georgia, serif" font-size="10" fill="#9898B8">trust. Trust holds everything.</text>
  <rect x="818" y="360" width="110" height="15" rx="3" fill="#B87333" fill-opacity="0.12" stroke="#B87333" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="826" y="370.5" font-family="Georgia, serif" font-size="8.5" fill="#B87333" opacity="0.9">Ch: 12 · 25 + App. X</text>

  <!-- CASCADE ARROW SECTION -->
  <line x1="60" y1="420" x2="1020" y2="420" stroke="#C89B3C" stroke-width="0.5" opacity="0.2"/>
  <text x="540" y="444" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" font-weight="bold" letter-spacing="2.5" fill="#C89B3C" opacity="0.55">THE CASCADE SEQUENCE</text>
  <text x="540" y="462" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#9898B8" letter-spacing="0.5">F2 Vision  →  F3 Governance  →  F1 Conflict  →  F5 Burnout  →  F6 People  →  F7 Scale  →  F4 Finance</text>
  <line x1="60" y1="474" x2="1020" y2="474" stroke="#C89B3C" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom row: F5, F6, F7 — 3 cards spanning full width -->
  <!-- each ~333px, x: 20, 374, 727 -->

  <!-- F5 -->
  <rect x="20" y="487" width="333" height="210" rx="8" fill="#E07B39" fill-opacity="0.07" stroke="#E07B39" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="20" y="487" width="5" height="210" rx="2" fill="#E07B39" opacity="0.75"/>
  <text x="38" y="516" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#E07B39" letter-spacing="1">F5</text>
  <text x="38" y="538" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">Burnout &amp; Loss of Commitment</text>
  <line x1="38" y1="547" x2="341" y2="547" stroke="#E07B39" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="38" y="564" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">The people who care most are closest to leaving.</text>
  <text x="38" y="578" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">Showing up from obligation is a warning signal.</text>
  <text x="38" y="598" font-family="Georgia, serif" font-size="10" fill="#9898B8">Burnout targets the most empathetic, most</text>
  <text x="38" y="612" font-family="Georgia, serif" font-size="10" fill="#9898B8">responsible members. By the time they withdraw,</text>
  <text x="38" y="626" font-family="Georgia, serif" font-size="10" fill="#9898B8">the structural core is already gone.</text>
  <rect x="38" y="644" width="120" height="15" rx="3" fill="#E07B39" fill-opacity="0.12" stroke="#E07B39" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="46" y="654.5" font-family="Georgia, serif" font-size="8.5" fill="#E07B39" opacity="0.9">Ch: 5 · 10 · 13 · 20 · 32</text>

  <!-- F6 -->
  <rect x="374" y="487" width="333" height="210" rx="8" fill="#7AD1E2" fill-opacity="0.07" stroke="#7AD1E2" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="374" y="487" width="5" height="210" rx="2" fill="#7AD1E2" opacity="0.75"/>
  <text x="392" y="516" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#7AD1E2" letter-spacing="1">F6</text>
  <text x="392" y="538" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">The Wrong-Fit People Problem</text>
  <line x1="392" y1="547" x2="695" y2="547" stroke="#7AD1E2" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="392" y="564" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">Someone is in who shouldn't be. Or no one</text>
  <text x="392" y="578" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">knows clearly who this project is not for.</text>
  <text x="392" y="598" font-family="Georgia, serif" font-size="10" fill="#9898B8">Inclusive instinct without admission criteria</text>
  <text x="392" y="612" font-family="Georgia, serif" font-size="10" fill="#9898B8">dilutes culture before it crystallizes. Clarity</text>
  <text x="392" y="626" font-family="Georgia, serif" font-size="10" fill="#9898B8">about who it's not for is an act of care.</text>
  <rect x="392" y="644" width="110" height="15" rx="3" fill="#7AD1E2" fill-opacity="0.12" stroke="#7AD1E2" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="400" y="654.5" font-family="Georgia, serif" font-size="8.5" fill="#7AD1E2" opacity="0.9">Ch: 12 · 18 · 25</text>

  <!-- F7 -->
  <rect x="728" y="487" width="332" height="210" rx="8" fill="#A8C5A0" fill-opacity="0.07" stroke="#A8C5A0" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="728" y="487" width="5" height="210" rx="2" fill="#A8C5A0" opacity="0.75"/>
  <text x="746" y="516" font-family="Georgia, serif" font-size="20" font-weight="900" fill="#A8C5A0" letter-spacing="1">F7</text>
  <text x="746" y="538" font-family="Georgia, serif" font-size="13.5" font-weight="700" fill="#EDE8DC">The Scale Trap</text>
  <line x1="746" y1="547" x2="1048" y2="547" stroke="#A8C5A0" stroke-opacity="0.18" stroke-width="0.5"/>
  <text x="746" y="564" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">What worked at 8 people breaks at 25.</text>
  <text x="746" y="578" font-family="Georgia, serif" font-size="10.5" fill="#C0C0D0" font-style="italic">What works at 25 breaks at 60.</text>
  <text x="746" y="598" font-family="Georgia, serif" font-size="10" fill="#9898B8">Each size threshold requires different</text>
  <text x="746" y="612" font-family="Georgia, serif" font-size="10" fill="#9898B8">organizational architecture. Build your</text>
  <text x="746" y="626" font-family="Georgia, serif" font-size="10" fill="#9898B8">theory of scale before you need it.</text>
  <rect x="746" y="644" width="148" height="15" rx="3" fill="#A8C5A0" fill-opacity="0.12" stroke="#A8C5A0" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="754" y="654.5" font-family="Georgia, serif" font-size="8.5" fill="#A8C5A0" opacity="0.9">Ch: 7 · 12 · 25 · 26 + App. Y</text>

  <!-- FOOTER -->
  <rect x="0" y="718" width="1080" height="90" fill="#0C0F1E" opacity="0.95"/>
  <line x1="0" y1="718" x2="1080" y2="718" stroke="#C89B3C" stroke-width="0.5" opacity="0.3"/>

  <text x="540" y="746" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#7878A0">From Bridging Earth &amp; Kanaria: Stopping the Collapse by Rick Broider</text>
  <text x="540" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7878A0">Free 4-question diagnostic, no signup required:</text>

  <!-- URL pill -->
  <rect x="340" y="778" width="400" height="26" rx="13" fill="#C89B3C" fill-opacity="0.1" stroke="#C89B3C" stroke-opacity="0.35" stroke-width="1"/>
  <text x="540" y="795" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#C89B3C" letter-spacing="0.5">stopthecollapse.com/diagnostic</text>

</svg>
